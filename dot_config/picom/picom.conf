# --- ROUNDED CORNERS ---
corner-radius = 15
rounded-corners-exclude = [
  # no rounded corners for top bar
  "class_g = 'dwm'"
];


# --- BLUR ---
# methods: none, gaussian, box, dual_kawase
blur:
{
  method = "dual_kawase";
  size = 10;
  strength = 3;
# deviation = false;
};
blur-background = true
# blur-background-frame = true
blur-background-fixed = true

# --- SHADOWS ---
shadow-radius = 1;
shadow-opacity = 0.6
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-color = "#393943"
# shadow-exclude = [];


# --- FADING ---
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 3


# --- MISC ---
# backends: `xrender`, `glx`, `egl`, `xr_glx_hybrid`
backend = "egl";
dithered-present = false;
vsync = true;
# mark-wmwin-focused = true;
# mark-ovredir-focused = true;
detect-rounded-corners = false
detect-client-opacity = true;
use-ewmh-active-win = true
detect-transient = true;
# glx-no-stencil = true
use-damage = true;
log-level = "warn";
